name: point_pillar_RDcomm_opv2v

# Put OPV2V under OpenCOOD/opv2v_data_dumping/
# Example:
# OpenCOOD/opv2v_data_dumping/train
# OpenCOOD/opv2v_data_dumping/validate
root_dir: "opv2v_data_dumping/train"
validate_dir: "opv2v_data_dumping/validate"

# Keep this block for compatibility with V2X-ViT / OpenCOOD wild settings.
# For OPV2V baseline debug, keep all impairments disabled.
wild_setting:
  async: false
  async_mode: 'sim'
  async_overhead: 100
  seed: 25
  loc_err: false
  xyz_std: 0.2
  ryp_std: 0.2
  data_size: 1.06
  transmission_speed: 27
  backbone_delay: 10

yaml_parser: "load_point_pillar_params"

train_params:
  batch_size: &batch_size 1
  epoches: 1
  eval_freq: 1
  save_freq: 1
  max_cav: &max_cav 5

fusion:
  core_method: 'IntermediateFusionDataset'
  args: []

preprocess:
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: &voxel_size [0.4, 0.4, 4]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000
  # Use V2X-ViT-compatible range so that the final feature size works with
  # MSwin window sizes [4, 8, 16].
  cav_lidar_range: &cav_lidar [-140.8, -38.4, -3, 140.8, 38.4, 1]

data_augment:
  - NAME: random_world_flip
    ALONG_AXIS_LIST: ['x']

  - NAME: random_world_rotation
    WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

  - NAME: random_world_scaling
    WORLD_SCALE_RANGE: [0.95, 1.05]

postprocess:
  core_method: 'VoxelPostprocessor'
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 3.9
    w: 1.6
    h: 1.56
    r: [0, 90]
    # V2X-ViT uses shrink_header stride=2 after PointPillar BEV backbone,
    # so final output stride is 4.
    feature_stride: 4
    num: &achor_num 2
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.27
  order: 'hwl'
  max_num: 100
  nms_thresh: 0.15

model:
  # Use OPV2V-compatible wrapper.
  # It keeps V2X-ViT unchanged but provides default prior_encoding
  # and spatial_correction_matrix for OPV2V.
  core_method: point_pillar_transformer_opv2v
  args:
    voxel_size: *voxel_size
    lidar_range: *cav_lidar
    anchor_number: *achor_num
    max_cav: *max_cav

    # 0 means no feature compression.
    # You can later set this to 32 for V2X-ViT-style compressed communication.
    compression: 0

    backbone_fix: false

    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]

    point_pillar_scatter:
      num_features: 64

    base_bev_backbone:
      layer_nums: [3, 5, 8]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]

    # 384 -> 256 and spatial downsample by 2.
    shrink_header:
      kernal_size: [3]
      stride: [2]
      padding: [1]
      dim: [256]
      input_dim: 384

    transformer:
      encoder: &encoder
        num_blocks: 1
        depth: 3
        use_roi_mask: true
        use_RTE: &use_RTE true
        RTE_ratio: &RTE_ratio 2

        cav_att_config: &cav_att_config
          dim: 256
          use_hetero: true
          use_RTE: *use_RTE
          RTE_ratio: *RTE_ratio
          heads: 8
          dim_head: 32
          dropout: 0.3

        pwindow_att_config: &pwindow_att_config
          dim: 256
          heads: [16, 8, 4]
          dim_head: [16, 32, 64]
          dropout: 0.3
          window_size: [4, 8, 16]
          relative_pos_embedding: true
          fusion_method: 'split_attn'

        feed_forward: &feed_forward
          mlp_dim: 256
          dropout: 0.3

        sttf: &sttf
          voxel_size: *voxel_size
          downsample_rate: 4

loss:
  core_method: point_pillar_loss
  args:
    cls_weight: 1.0
    reg: 2.0

optimizer:
  core_method: Adam
  lr: 0.001
  args:
    eps: 1e-10
    weight_decay: 1e-4

lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size: [15, 50]