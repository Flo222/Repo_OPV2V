# -*- coding: utf-8 -*-
# -------------------------------------------------------------------
# PointPillar-RDcomm on OPV2V - Inference
#
# Inference pipeline:
#   Fs
#     -> confidence map Cs
#     -> Mc = 1[Cs > tau_c]
#     -> layered VQ: Dbase / Dres / Fq_s
#     -> Bbase[Dbase] as coarse abstraction for MI estimation
#     -> R_s->r = sigmoid(Phi_MI(Fhat_q_sc, F_r))
#     -> M_MI = 1[R_s->r < tau_mi]
#     -> sparse message = Fq_s * Mc * M_MI
#     -> smoothing UNet
#     -> max fusion
#     -> detection head
#
# Recommended run:
#   python opencood/tools/inference_rdcomm.py \
#     --hypes_yaml opencood/hypes_yaml/rdcomm/point_pillar_rdcomm_opv2v_infer.yaml \
#     --checkpoint path/to/stage3/net_epochXX.pth \
#     --huffman_table path/to/stage2/huffman_table.pth \
#     --tau_c 0.005 \
#     --tau_mi 0.7 \
#     --output_dir opencood/logs/rdcomm_eval/opv2v_tauc_0p005
#
# Bandwidth sweep:
#   python opencood/tools/rdcomm_eval_bandwidth.py \
#     --hypes_yaml opencood/hypes_yaml/rdcomm/point_pillar_rdcomm_opv2v_infer.yaml \
#     --checkpoint path/to/stage3/net_epochXX.pth \
#     --huffman_table path/to/stage2/huffman_table.pth \
#     --output_root opencood/logs/rdcomm_bandwidth/opv2v \
#     --tau_c_values "0,0.001,0.003,0.005,0.007,0.01,0.03,0.05,0.07,0.1,0.3,0.5,0.7,0.9" \
#     --tau_mi_values "0.7"
# -------------------------------------------------------------------

name: point_pillar_rdcomm_opv2v_infer

# 按你的服务器数据路径修改。
# OpenCOOD 的 build_dataset(train=False) 通常读取 validate_dir。
root_dir: "opv2v_data_dumping/train"
validate_dir: "opv2v_data_dumping/validate"

yaml_parser: "load_point_pillar_params"


# -------------------------------------------------------------------
# Inference / dataloader params
# -------------------------------------------------------------------
train_params:
  batch_size: &batch_size 1
  test_batch_size: 1
  val_batch_size: 1

  # inference 脚本不用 epoches，但保留字段保证 OpenCOOD 工具兼容。
  epoches: 1
  eval_freq: 1
  save_freq: 1

  # RDcomm paper OPV2V detection setting usually 最多 3 agents。
  max_cav: &max_cav 3

  num_workers: 4


# -------------------------------------------------------------------
# Dataset fusion mode
# -------------------------------------------------------------------
fusion:
  core_method: "IntermediateFusionDataset"
  args: []


# -------------------------------------------------------------------
# Preprocess
# -------------------------------------------------------------------
preprocess:
  core_method: "SpVoxelPreprocessor"

  args:
    voxel_size: &voxel_size [0.4, 0.4, 4]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000

  # RDcomm / OPV2V detection range:
  # x: [-102.4, 102.4], y: [-51.2, 51.2]
  cav_lidar_range: &cav_lidar [-102.4, -51.2, -3, 102.4, 51.2, 1]


# -------------------------------------------------------------------
# Data augmentation
# -------------------------------------------------------------------
# Inference normally does not use augmentation, but OpenCOOD yaml often keeps
# this section for parser compatibility.
data_augment: []


# -------------------------------------------------------------------
# Postprocess / anchor / label generation
# -------------------------------------------------------------------
postprocess:
  core_method: "VoxelPostprocessor"

  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 3.9
    w: 1.6
    h: 1.56
    r: [0, 90]
    feature_stride: 2
    num: &anchor_num 2

  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.20

  order: "hwl"
  max_num: 100
  nms_thresh: 0.15


# -------------------------------------------------------------------
# Model
# -------------------------------------------------------------------
model:
  core_method: "point_pillar_rdcomm"

  args:
    # Basic geometry
    voxel_size: *voxel_size
    lidar_range: *cav_lidar

    # Detection head
    anchor_number: *anchor_num
    anchor_num: *anchor_num
    num_class: 1
    reg_dim: 7

    # RDcomm inference stage
    rdcomm_stage: "infer"

    # Main inference thresholds.
    # tau_c is usually swept to obtain AP-communication curves.
    # tau_mi is commonly fixed to 0.7.
    tau_c: 0.005
    tau_mi: 0.7
    ego_index: 0

    # PointPillar VFE
    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]

    # Pillar scatter
    point_pillar_scatter:
      num_features: 64

    # BEV backbone
    base_bev_backbone:
      layer_nums: [3, 5, 8]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]

    compression: 0

    # sum(num_upsample_filter) = 384
    out_channel: &rdcomm_feature_channels 384

    # ---------------------------------------------------------------
    # RDcomm modules
    # ---------------------------------------------------------------
    rdcomm:
      stage: "infer"

      # Full RDcomm inference uses all four parts.
      use_vq: true
      use_mi: true
      use_smoothing: true
      use_entropy_coding: true

      tau_c: 0.005
      tau_mi: 0.7
      ego_index: 0

      return_intermediate: true

      # false means: after smoothing, the smoothed message participates in
      # full spatial max-fusion. If true, fusion would again mask out
      # smoothed/dilated regions, which weakens Phi_smth.
      fusion_use_message_mask: false

      zero_message_when_empty: true

      # -------------------------------------------------------------
      # Confidence generator
      # -------------------------------------------------------------
      confidence:
        source: "task"
        activation: "sigmoid"
        reduce: "max"

        # Same as top-level tau_c. CLI --tau_c will override both.
        tau_c: 0.005

        detach_confidence: true
        clamp_confidence: true
        return_stats: true

      # -------------------------------------------------------------
      # Layered vector quantization
      # -------------------------------------------------------------
      # Must exactly match Stage 2 / Stage 3 settings.
      vq:
        in_channels: *rdcomm_feature_channels
        code_dim: 64

        # Bbase / Bres
        base_codebook_size: 32
        res_codebook_size: 128
        use_residual: true

        commitment_weight: 0.25
        base_commitment_weight: 0.25
        res_commitment_weight: 0.25

        recon_loss_type: "mse"

        normalize_latent: false
        use_cosine_distance: false

        # If inference memory is too high, set to 65536 or 32768.
        distance_chunk_size: 0

        projector_hidden_channels: 384
        projector_num_layers: 1
        projector_activation: "relu"
        use_bn: false
        dropout: 0.0

        codebook_init: "uniform"

      # -------------------------------------------------------------
      # Task entropy coder
      # -------------------------------------------------------------
      # At inference, code lengths should be loaded from:
      #   --huffman_table path/to/huffman_table.pth
      # If no table is loaded, fixed-length fallback is used.
      entropy:
        base_codebook_size: 32
        res_codebook_size: 128

        tau_filter: 0.2
        filter_mode: "hard"

        include_zero_weight: false
        min_weight: 1.0e-12
        default_length_mode: "fixed"
        single_symbol_length: 1
        fixed_length_if_unbuilt: true
        resize_inputs: false
        store_codes: true

      # -------------------------------------------------------------
      # Mutual-information estimator
      # -------------------------------------------------------------
      mi:
        sender_channels: *rdcomm_feature_channels
        receiver_channels: *rdcomm_feature_channels

        hidden_channels: 128
        num_layers: 3
        activation: "relu"
        dropout: 0.0

        use_bn: false
        use_layer_norm: false

        # sender / receiver channels are both 384, so this mode is valid.
        pair_mode: "concat_absdiff_mul"
        kernel_size: 1

        # Same as top-level tau_mi. CLI --tau_mi will override both.
        tau_mi: 0.7

        # Only used if train_mi=True; inference keeps it for compatibility.
        num_samples: 4096
        same_batch_negative: false
        replace: false

        resize_sender: false
        resize_receiver: false
        resize_mode: "bilinear"
        resize_mask: false

        loss_reduction: "mean"
        pos_weight: 1.0
        neg_weight: 1.0

        detach_inputs: false
        detach_sender: false
        detach_receiver: false

        return_stats: true

      # -------------------------------------------------------------
      # Smoothing UNet
      # -------------------------------------------------------------
      smoothing:
        in_channels: *rdcomm_feature_channels
        out_channels: *rdcomm_feature_channels

        base_channels: 64
        depth: 3
        channel_multipliers: [1, 2, 4]

        norm: "bn"
        activation: "relu"
        dropout: 0.0
        num_groups: 8

        downsample: "maxpool"
        upsample: "bilinear"

        append_mask: true
        apply_input_mask: true
        resize_mask: false

        residual: true
        residual_scale: 1.0
        use_gating: false
        output_activation: "none"
        return_stats: true

      # -------------------------------------------------------------
      # Fusion
      # -------------------------------------------------------------
      fusion:
        fusion_mode: "max"
        ego_index: 0
        include_ego: true
        apply_mask_to_ego: false

        # In this simplified implementation, features are assumed aligned by
        # the OpenCOOD intermediate-fusion data pipeline. If you later confirm
        # your pairwise_t_matrix is compatible with warp_affine_simple, you can
        # set this to true.
        use_pairwise_transform: false
        pairwise_index_order: "ego_src"
        use_opencood_warp: true
        align_corners: false
        padding_mode: "zeros"

        resize_masks: false
        max_fill_value: -1000000000.0
        eps: 1.0e-6
        return_dict: false


# -------------------------------------------------------------------
# Loss
# -------------------------------------------------------------------
# inference_rdcomm.py does not need loss, but keeping this section makes
# the yaml usable with OpenCOOD utilities that expect loss config.
loss:
  core_method: "rdcomm_loss"

  args:
    rdcomm_stage: "infer"

    use_task_loss: true
    use_point_pillar_loss: true

    task_loss:
      cls_weight: 1.0
      reg: 2.0

    stage_weights:
      stage1:
        task: 1.0
        recon: 0.0
        vq: 0.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

      stage2_vq:
        task: 1.0
        recon: 1.0
        vq: 1.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

      stage3_mi:
        task: 0.0
        recon: 0.0
        vq: 0.0
        mi: 1.0
        codebook: 0.0
        commitment: 0.0

      infer:
        task: 1.0
        recon: 0.0
        vq: 0.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

    task_weight: 1.0
    recon_weight: 1.0
    vq_weight: 1.0
    mi_weight: 1.0

    codebook_weight: 0.0
    commitment_weight: 0.0

    log_comm: true


# -------------------------------------------------------------------
# Optimizer
# -------------------------------------------------------------------
# Inference does not use optimizer; retained for compatibility.
optimizer:
  core_method: "Adam"
  lr: 0.001

  args:
    eps: 1.0e-10
    weight_decay: 1.0e-4


# -------------------------------------------------------------------
# LR scheduler
# -------------------------------------------------------------------
# Inference does not use scheduler; retained for compatibility.
lr_scheduler:
  core_method: "multistep"
  gamma: 0.1
  step_size: [1]