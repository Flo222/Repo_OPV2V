# -*- coding: utf-8 -*-
# -------------------------------------------------------------------
# PointPillar-RDcomm on OPV2V - Stage 2 VQ
#
# Stage 2 objective:
#   Load Stage-1 perception checkpoint, then train layered VQ module:
#
#       Fs -> Bbase / Bres -> Fq_s
#
#   Loss:
#       L = Ltask + lambda_recon * ||Fq_s - Fs||^2 + lambda_vq * Lvq
#
# Recommended run:
#   python opencood/tools/train_rdcomm.py \
#     --hypes_yaml opencood/hypes_yaml/rdcomm/point_pillar_rdcomm_opv2v_stage2_vq.yaml \
#     --rdcomm_stage stage2_vq \
#     --stage1_ckpt path/to/stage1/net_epochXX.pth
#
# After this stage, build Huffman table:
#   python opencood/tools/rdcomm_build_huffman.py \
#     --hypes_yaml opencood/hypes_yaml/rdcomm/point_pillar_rdcomm_opv2v_stage2_vq.yaml \
#     --checkpoint path/to/stage2/net_epochXX.pth \
#     --output_path path/to/stage2/huffman_table.pth
# -------------------------------------------------------------------

name: point_pillar_rdcomm_opv2v_stage2_vq

# 按你的服务器数据路径修改。
root_dir: "opv2v_data_dumping/train"
validate_dir: "opv2v_data_dumping/validate"

yaml_parser: "load_point_pillar_params"


# -------------------------------------------------------------------
# Training
# -------------------------------------------------------------------
train_params:
  batch_size: &batch_size 2
  epoches: 10
  eval_freq: 1
  save_freq: 1

  # RDcomm paper OPV2V detection setting usually最多 3 agents。
  max_cav: &max_cav 3

  num_workers: 4


# -------------------------------------------------------------------
# Dataset fusion mode
# -------------------------------------------------------------------
fusion:
  core_method: "IntermediateFusionDataset"
  args: []


# -------------------------------------------------------------------
# Preprocess
# -------------------------------------------------------------------
preprocess:
  core_method: "SpVoxelPreprocessor"

  args:
    voxel_size: &voxel_size [0.4, 0.4, 4]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000

  cav_lidar_range: &cav_lidar [-102.4, -51.2, -3, 102.4, 51.2, 1]


# -------------------------------------------------------------------
# Data augmentation
# -------------------------------------------------------------------
data_augment:
  - NAME: "random_world_flip"
    ALONG_AXIS_LIST: ["x"]

  - NAME: "random_world_rotation"
    WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

  - NAME: "random_world_scaling"
    WORLD_SCALE_RANGE: [0.95, 1.05]


# -------------------------------------------------------------------
# Postprocess / anchor / label generation
# -------------------------------------------------------------------
postprocess:
  core_method: "VoxelPostprocessor"

  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 3.9
    w: 1.6
    h: 1.56
    r: [0, 90]
    feature_stride: 2
    num: &anchor_num 2

  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.20

  order: "hwl"
  max_num: 100
  nms_thresh: 0.15


# -------------------------------------------------------------------
# Model
# -------------------------------------------------------------------
model:
  core_method: "point_pillar_rdcomm"

  args:
    # Basic geometry
    voxel_size: *voxel_size
    lidar_range: *cav_lidar

    # Detection head
    anchor_number: *anchor_num
    anchor_num: *anchor_num
    num_class: 1
    reg_dim: 7

    # RDcomm stage
    rdcomm_stage: "stage2_vq"

    # Stage 2 主要训练 VQ；tau_c 用于统计 confidence frequency。
    # 如果想让 Huffman 统计更稀疏，可以后续 build_huffman 时加 --mask_by_tau_c。
    tau_c: 0.0
    tau_mi: 0.7
    ego_index: 0

    # PointPillar VFE
    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]

    # Pillar scatter
    point_pillar_scatter:
      num_features: 64

    # BEV backbone
    base_bev_backbone:
      layer_nums: [3, 5, 8]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]

    compression: 0

    # sum(num_upsample_filter) = 384
    out_channel: &rdcomm_feature_channels 384

    # ---------------------------------------------------------------
    # RDcomm modules
    # ---------------------------------------------------------------
    rdcomm:
      stage: "stage2_vq"

      use_vq: true
      use_mi: false
      use_smoothing: false
      use_entropy_coding: true

      tau_c: 0.0
      tau_mi: 0.7
      ego_index: 0

      return_intermediate: true
      fusion_use_message_mask: false
      zero_message_when_empty: true

      confidence:
        source: "task"
        activation: "sigmoid"
        reduce: "max"
        tau_c: 0.0
        detach_confidence: true
        clamp_confidence: true
        return_stats: true

      # -------------------------------------------------------------
      # Layered vector quantization
      # -------------------------------------------------------------
      vq:
        in_channels: *rdcomm_feature_channels
        code_dim: 64

        # Bbase / Bres
        base_codebook_size: 32
        res_codebook_size: 128
        use_residual: true

        # VQ-VAE style commitment/codebook loss.
        commitment_weight: 0.25
        base_commitment_weight: 0.25
        res_commitment_weight: 0.25

        # Feature reconstruction loss for Lrecon.
        recon_loss_type: "mse"

        normalize_latent: false
        use_cosine_distance: false

        # 0 means compute full distance matrix directly.
        # 如果显存炸，可以改成 65536 或 32768。
        distance_chunk_size: 0

        projector_hidden_channels: 384
        projector_num_layers: 1
        projector_activation: "relu"
        use_bn: false
        dropout: 0.0

        codebook_init: "uniform"

      # -------------------------------------------------------------
      # Task entropy coder
      # -------------------------------------------------------------
      entropy:
        base_codebook_size: 32
        res_codebook_size: 128

        # RDcomm task entropy coding 默认固定 tau_filter=0.2。
        tau_filter: 0.2
        filter_mode: "hard"

        include_zero_weight: false
        min_weight: 1.0e-12
        default_length_mode: "fixed"
        single_symbol_length: 1
        fixed_length_if_unbuilt: true
        resize_inputs: false
        store_codes: true

      # Stage 2 不训练 MI，但保留配置，方便同一模型权重进入 Stage 3。
      mi:
        sender_channels: *rdcomm_feature_channels
        receiver_channels: *rdcomm_feature_channels

        hidden_channels: 128
        num_layers: 3
        activation: "relu"
        dropout: 0.0
        use_bn: false
        use_layer_norm: false
        pair_mode: "concat_absdiff_mul"
        kernel_size: 1

        tau_mi: 0.7
        num_samples: 4096
        same_batch_negative: false
        replace: false

        resize_sender: false
        resize_receiver: false
        resize_mode: "bilinear"
        resize_mask: false

        loss_reduction: "mean"
        pos_weight: 1.0
        neg_weight: 1.0

        detach_inputs: false
        detach_sender: false
        detach_receiver: false
        return_stats: true

      # Stage 2 不训练 smoothing，但保留模块。
      smoothing:
        in_channels: *rdcomm_feature_channels
        out_channels: *rdcomm_feature_channels

        base_channels: 64
        depth: 3
        channel_multipliers: [1, 2, 4]

        norm: "bn"
        activation: "relu"
        dropout: 0.0
        num_groups: 8

        downsample: "maxpool"
        upsample: "bilinear"

        append_mask: true
        apply_input_mask: true
        resize_mask: false

        residual: true
        residual_scale: 1.0
        use_gating: false
        output_activation: "none"
        return_stats: true

      fusion:
        fusion_mode: "max"
        ego_index: 0
        include_ego: true
        apply_mask_to_ego: false

        use_pairwise_transform: false
        pairwise_index_order: "ego_src"
        use_opencood_warp: true
        align_corners: false
        padding_mode: "zeros"

        resize_masks: false
        max_fill_value: -1000000000.0
        eps: 1.0e-6
        return_dict: false


# -------------------------------------------------------------------
# Loss
# -------------------------------------------------------------------
loss:
  core_method: "rdcomm_loss"

  args:
    rdcomm_stage: "stage2_vq"

    use_task_loss: true
    use_point_pillar_loss: true

    task_loss:
      cls_weight: 1.0
      reg: 2.0

    # Stage 2:
    #   task 保持检测性能；
    #   recon 约束 Fq_s 接近 Fs；
    #   vq 训练 codebook / commitment。
    stage_weights:
      stage1:
        task: 1.0
        recon: 0.0
        vq: 0.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

      stage2_vq:
        task: 1.0
        recon: 1.0
        vq: 1.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

      stage3_mi:
        task: 0.0
        recon: 0.0
        vq: 0.0
        mi: 1.0
        codebook: 0.0
        commitment: 0.0

      infer:
        task: 1.0
        recon: 0.0
        vq: 0.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

    task_weight: 1.0

    # 这两个是最关键的 Stage 2 权重。
    # 如果检测 AP 掉太多：先把 recon_weight 调大；
    # 如果 codebook 不稳定：把 vq_weight 调小到 0.25 或 0.5。
    recon_weight: 1.0
    vq_weight: 1.0

    mi_weight: 1.0
    codebook_weight: 0.0
    commitment_weight: 0.0

    log_comm: true


# -------------------------------------------------------------------
# Optimizer
# -------------------------------------------------------------------
optimizer:
  core_method: "Adam"
  lr: 0.001

  args:
    eps: 1.0e-10
    weight_decay: 1.0e-4


# -------------------------------------------------------------------
# LR scheduler
# -------------------------------------------------------------------
lr_scheduler:
  core_method: "multistep"
  gamma: 0.1
  step_size: [6, 9]