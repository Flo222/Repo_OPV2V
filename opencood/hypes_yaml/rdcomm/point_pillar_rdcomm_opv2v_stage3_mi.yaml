# -*- coding: utf-8 -*-
# -------------------------------------------------------------------
# PointPillar-RDcomm on OPV2V - Stage 3 MI
#
# Stage 3 objective:
#   Load Stage-2 VQ checkpoint, then train mutual-information estimator:
#
#       R_s->r = sigmoid(Phi_MI(Fhat_q_sc, F_r))
#       M_MI  = 1[R_s->r < tau_mi]
#
#   Positive pair:
#       sender abstraction and receiver feature at the same BEV location.
#
#   Negative pair:
#       sender abstraction and randomly mismatched receiver feature.
#
#   Loss:
#       L = L_MI
#
# Recommended run:
#   python opencood/tools/train_rdcomm.py \
#     --hypes_yaml opencood/hypes_yaml/rdcomm/point_pillar_rdcomm_opv2v_stage3_mi.yaml \
#     --rdcomm_stage stage3_mi \
#     --stage2_ckpt path/to/stage2/net_epochXX.pth
# -------------------------------------------------------------------

name: point_pillar_rdcomm_opv2v_stage3_mi

# 按你的服务器数据路径修改。
root_dir: "opv2v_data_dumping/train"
validate_dir: "opv2v_data_dumping/validate"

yaml_parser: "load_point_pillar_params"


# -------------------------------------------------------------------
# Training
# -------------------------------------------------------------------
train_params:
  batch_size: &batch_size 2
  epoches: 5
  eval_freq: 1
  save_freq: 1

  # RDcomm paper OPV2V detection setting usually最多 3 agents。
  max_cav: &max_cav 3

  num_workers: 4


# -------------------------------------------------------------------
# Dataset fusion mode
# -------------------------------------------------------------------
fusion:
  core_method: "IntermediateFusionDataset"
  args: []


# -------------------------------------------------------------------
# Preprocess
# -------------------------------------------------------------------
preprocess:
  core_method: "SpVoxelPreprocessor"

  args:
    voxel_size: &voxel_size [0.4, 0.4, 4]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000

  cav_lidar_range: &cav_lidar [-102.4, -51.2, -3, 102.4, 51.2, 1]


# -------------------------------------------------------------------
# Data augmentation
# -------------------------------------------------------------------
data_augment:
  - NAME: "random_world_flip"
    ALONG_AXIS_LIST: ["x"]

  - NAME: "random_world_rotation"
    WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

  - NAME: "random_world_scaling"
    WORLD_SCALE_RANGE: [0.95, 1.05]


# -------------------------------------------------------------------
# Postprocess / anchor / label generation
# -------------------------------------------------------------------
postprocess:
  core_method: "VoxelPostprocessor"

  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 3.9
    w: 1.6
    h: 1.56
    r: [0, 90]
    feature_stride: 2
    num: &anchor_num 2

  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.20

  order: "hwl"
  max_num: 100
  nms_thresh: 0.15


# -------------------------------------------------------------------
# Model
# -------------------------------------------------------------------
model:
  core_method: "point_pillar_rdcomm"

  args:
    # Basic geometry
    voxel_size: *voxel_size
    lidar_range: *cav_lidar

    # Detection head
    anchor_number: *anchor_num
    anchor_num: *anchor_num
    num_class: 1
    reg_dim: 7

    # RDcomm stage
    rdcomm_stage: "stage3_mi"

    # tau_c 用于限制 MI 训练时采样区域。
    # tau_mi 是推理时的 redundancy threshold，Stage 3 中也保留。
    tau_c: 0.0
    tau_mi: 0.7
    ego_index: 0

    # PointPillar VFE
    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]

    # Pillar scatter
    point_pillar_scatter:
      num_features: 64

    # BEV backbone
    base_bev_backbone:
      layer_nums: [3, 5, 8]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]

    compression: 0

    # sum(num_upsample_filter) = 384
    out_channel: &rdcomm_feature_channels 384

    # ---------------------------------------------------------------
    # RDcomm modules
    # ---------------------------------------------------------------
    rdcomm:
      stage: "stage3_mi"

      # Stage 3:
      #   use_vq=True: 使用 Stage-2 学到的 Bbase 得到 coarse abstraction。
      #   use_mi=True: 训练 MI estimator。
      #   use_smoothing=False: Stage 3 只训练冗余估计，不训练 smoothing。
      use_vq: true
      use_mi: true
      use_smoothing: false
      use_entropy_coding: true

      tau_c: 0.0
      tau_mi: 0.7
      ego_index: 0

      return_intermediate: true
      fusion_use_message_mask: false
      zero_message_when_empty: true

      confidence:
        source: "task"
        activation: "sigmoid"
        reduce: "max"
        tau_c: 0.0
        detach_confidence: true
        clamp_confidence: true
        return_stats: true

      # -------------------------------------------------------------
      # Layered vector quantization
      # -------------------------------------------------------------
      # 必须和 Stage 2 完全一致，否则 checkpoint 形状对不上。
      vq:
        in_channels: *rdcomm_feature_channels
        code_dim: 64

        # Bbase / Bres
        base_codebook_size: 32
        res_codebook_size: 128
        use_residual: true

        commitment_weight: 0.25
        base_commitment_weight: 0.25
        res_commitment_weight: 0.25

        recon_loss_type: "mse"

        normalize_latent: false
        use_cosine_distance: false
        distance_chunk_size: 0

        projector_hidden_channels: 384
        projector_num_layers: 1
        projector_activation: "relu"
        use_bn: false
        dropout: 0.0

        codebook_init: "uniform"

      # -------------------------------------------------------------
      # Task entropy coder
      # -------------------------------------------------------------
      # Stage 3 不重新构建 Huffman table，但保留 coder。
      # 推理时会通过 --huffman_table 加载 Stage 2 后构建出的表。
      entropy:
        base_codebook_size: 32
        res_codebook_size: 128

        tau_filter: 0.2
        filter_mode: "hard"

        include_zero_weight: false
        min_weight: 1.0e-12
        default_length_mode: "fixed"
        single_symbol_length: 1
        fixed_length_if_unbuilt: true
        resize_inputs: false
        store_codes: true

      # -------------------------------------------------------------
      # Mutual-information estimator
      # -------------------------------------------------------------
      mi:
        sender_channels: *rdcomm_feature_channels
        receiver_channels: *rdcomm_feature_channels

        hidden_channels: 128
        num_layers: 3
        activation: "relu"
        dropout: 0.0

        # ConvMapEstimator 用 BatchNorm 可选；
        # Stage 3 通常冻结 backbone/VQ，只训练 MI estimator。
        use_bn: false

        # PairMLPEstimator 可选 LayerNorm。
        use_layer_norm: false

        # 如果 sender/receiver channel 相同，使用 concat_absdiff_mul；
        # 若后续你改了通道数不一致，需要改成 concat。
        pair_mode: "concat_absdiff_mul"
        kernel_size: 1

        # RDcomm inference usually fixes tau_mi = 0.7.
        tau_mi: 0.7

        # 每个 sender-receiver pair 中采样的 BEV 位置数。
        # 如果显存不够，可以调成 2048 或 1024。
        num_samples: 4096

        # 负样本策略：
        # false: 在整个 batch 的 BEV locations 中随机错配；
        # true: 只在同一个 scene/sample 内错配。
        same_batch_negative: false

        replace: false

        resize_sender: false
        resize_receiver: false
        resize_mode: "bilinear"
        resize_mask: false

        loss_reduction: "mean"
        pos_weight: 1.0
        neg_weight: 1.0

        # Stage 3 通常冻结 sender/receiver feature extractor，
        # 这里 detach_inputs=false 是为了让冻结机制统一控制。
        # 如果想更省显存，可以改为 true。
        detach_inputs: false
        detach_sender: false
        detach_receiver: false

        return_stats: true

      # -------------------------------------------------------------
      # Smoothing UNet
      # -------------------------------------------------------------
      # Stage 3 不训练 smoothing，但保留模块以便同一 checkpoint 进入 infer。
      smoothing:
        in_channels: *rdcomm_feature_channels
        out_channels: *rdcomm_feature_channels

        base_channels: 64
        depth: 3
        channel_multipliers: [1, 2, 4]

        norm: "bn"
        activation: "relu"
        dropout: 0.0
        num_groups: 8

        downsample: "maxpool"
        upsample: "bilinear"

        append_mask: true
        apply_input_mask: true
        resize_mask: false

        residual: true
        residual_scale: 1.0
        use_gating: false
        output_activation: "none"
        return_stats: true

      # -------------------------------------------------------------
      # Fusion
      # -------------------------------------------------------------
      fusion:
        fusion_mode: "max"
        ego_index: 0
        include_ego: true
        apply_mask_to_ego: false

        use_pairwise_transform: false
        pairwise_index_order: "ego_src"
        use_opencood_warp: true
        align_corners: false
        padding_mode: "zeros"

        resize_masks: false
        max_fill_value: -1000000000.0
        eps: 1.0e-6
        return_dict: false


# -------------------------------------------------------------------
# Loss
# -------------------------------------------------------------------
loss:
  core_method: "rdcomm_loss"

  args:
    rdcomm_stage: "stage3_mi"

    # Stage 3 只优化 MI loss。
    # 这里保留 PointPillarLoss 初始化，是为了 train/val 脚本兼容；
    # stage_weights 中 task=0，所以它不会进入 total loss。
    use_task_loss: true
    use_point_pillar_loss: true

    task_loss:
      cls_weight: 1.0
      reg: 2.0

    stage_weights:
      stage1:
        task: 1.0
        recon: 0.0
        vq: 0.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

      stage2_vq:
        task: 1.0
        recon: 1.0
        vq: 1.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

      stage3_mi:
        task: 0.0
        recon: 0.0
        vq: 0.0
        mi: 1.0
        codebook: 0.0
        commitment: 0.0

      infer:
        task: 1.0
        recon: 0.0
        vq: 0.0
        mi: 0.0
        codebook: 0.0
        commitment: 0.0

    task_weight: 1.0
    recon_weight: 1.0
    vq_weight: 1.0

    # Stage 3 核心权重。
    mi_weight: 1.0

    codebook_weight: 0.0
    commitment_weight: 0.0

    loss_reduction: "mean"
    mi_pos_weight: 1.0
    mi_neg_weight: 1.0
    mi_acc_threshold: 0.0

    log_comm: true


# -------------------------------------------------------------------
# Optimizer
# -------------------------------------------------------------------
optimizer:
  core_method: "Adam"
  lr: 0.001

  args:
    eps: 1.0e-10
    weight_decay: 1.0e-4


# -------------------------------------------------------------------
# LR scheduler
# -------------------------------------------------------------------
lr_scheduler:
  core_method: "multistep"
  gamma: 0.1
  step_size: [3, 5]